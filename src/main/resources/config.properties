# Browser Configuration
browser=chrome
# Supported browsers: chrome, firefox, edge

# Application URL
baseURL=https://www.example.com

# Wait Configuration (in seconds)
implicitWait=10
explicitWait=20
pageLoadTimeout=30
fluentWaitTimeout=30
fluentWaitPollingInterval=500

# Test Execution Configuration
headless=false
maximizeWindow=true
clearCookies=true

# Screenshot Configuration
captureScreenshotOnPass=false
captureScreenshotOnFailure=true
screenshotFormat=png

# Report Configuration
reportTitle=Loan Origination Financial Systems Test Report
reportName=Test Automation Report
generateExtentReport=true

# Environment Configuration
environment=QA
testDataPath=src/test/resources/testdata/
